name: "Testing"

on:
  push:
    branches: [ master, dev ]
    tags: [ "v*" ]
  pull_request:
    branches: [ master, dev ]

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  golangci:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: "Install libpam"
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam-dev
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
  buildsh:
    name: "Verify build.sh"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: "Install libpam"
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam-dev
      - name: "Verify build.sh"
        run: |
          ./build.sh
          ./build.sh --destdir destdir/ install
          find destdir/
  test:
    name: "Build and test"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
    - name: "Install libpam"
      run: |
        sudo apt-get update
        sudo apt-get install -y libpam-dev
    - name: "Unit & module tests"
      run: |
        go test ./... -coverprofile=coverage.out -covermode=atomic
    - name: "Integration tests"
      run: |
        cd tests/
        ./run.sh
